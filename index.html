<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lofi Prompt Generator PRO</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

select,button{
padding:10px;
margin:5px;
width:260px;
font-size:16px;
border-radius:6px;
border:none;
}

textarea{
width:100%;
height:220px;
margin-top:20px;
font-size:15px;
background:#000;
color:#0f0;
padding:10px;
}

button{
cursor:pointer;
background:#333;
color:white;
}

button:hover{
background:#555;
}
</style>

</head>

<body>

<h2>🎧 LOFI PROMPT GENERATOR PRO</h2>

<!-- UI TIẾNG VIỆT -->
<select id="genre"></select><br>
<select id="instrument"></select><br>
<select id="purpose"></select><br>

<button onclick="generatePrompt()">Tạo Prompt</button>
<button onclick="randomPrompt()">Random Pro</button>

<textarea id="result"></textarea>

<script>

// ===== MAP VIỆT → ANH =====

const genreMap={
"Lofi chill":"lofi chill beat",
"Lofi hip hop":"lofi hip hop beat",
"Lofi jazz":"jazzy lofi beat",
"Lofi ambient":"ambient lofi beat",
"Lofi dreamy":"dreamy lofi beat"
}

const instrumentMap={
"Piano mềm":"soft piano",
"Piano điện":"electric piano",
"Guitar nhẹ":"mellow guitar",
"Rhodes":"rhodes piano",
"Synth pad":"lofi synth pad",
"Guitar acoustic":"acoustic guitar"
}

const purposeMap={
"Học tập":"studying",
"Thư giãn":"relaxing",
"Ngủ":"sleeping",
"Đọc sách":"reading",
"Tập trung":"focus work"
}

// ===== RANDOM DATA =====

const hook=[
"simple repeating piano motif",
"soft emotional chord loop",
"hypnotic melody loop"
]

const drum=[
"soft boom bap drum",
"minimal chill drum",
"light jazz drum groove"
]

const texture=[
"vinyl crackle",
"tape saturation",
"vintage lofi filter"
]

const ambience=[
"rain ambience",
"coffee shop ambience",
"night city ambience"
]

const tempo=[
"slow tempo 60 bpm",
"chill tempo 70 bpm",
"smooth tempo 80 bpm"
]

const emotion=[
"nostalgic rainy night",
"lonely late night thoughts",
"peaceful calm focus"
]

const story=[
"alone in a small apartment at 2am",
"watching rain through the window",
"late night coding session"
]

// ===== LOAD SELECT =====

function loadSelect(id,data){
let select=document.getElementById(id)
Object.keys(data).forEach(key=>{
let option=document.createElement("option")
option.value=key
option.text=key
select.appendChild(option)
})
}

loadSelect("genre",genreMap)
loadSelect("instrument",instrumentMap)
loadSelect("purpose",purposeMap)

// ===== RANDOM =====

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

// ===== SMART LOGIC =====

function smart(purpose){

if(purpose==="sleeping"){
return {
tempo:"slow tempo 60 bpm",
drum:"minimal chill drum",
ambience:"rain ambience"
}
}

if(purpose==="focus work"){
return {
tempo:"smooth tempo 80 bpm",
drum:"soft boom bap drum",
ambience:"coffee shop ambience"
}
}

return {
tempo:rand(tempo),
drum:rand(drum),
ambience:rand(ambience)
}
}

// ===== GENERATE =====

function generatePrompt(){

let genreVI=document.getElementById("genre").value
let instrumentVI=document.getElementById("instrument").value
let purposeVI=document.getElementById("purpose").value

let g=genreMap[genreVI]
let i=instrumentMap[instrumentVI]
let p=purposeMap[purposeVI]

let s=smart(p)

let prompt=`${g} instrumental lofi beat,

main melody: ${i} with ${rand(hook)},

drum: ${s.drum},
texture: ${rand(texture)},
ambience: ${s.ambience},

tempo: ${s.tempo},

emotion: ${rand(emotion)},
scene: ${rand(story)},

structure:
- melody comes early
- subtle variation every 30 seconds
- emotional peak
- smooth loop

background music for ${p},
immersive, no vocals`

document.getElementById("result").value=prompt
}

// ===== RANDOM PRO =====

function randomPrompt(){

let g=rand(Object.values(genreMap))
let i=rand(Object.values(instrumentMap))
let p=rand(Object.values(purposeMap))

let s=smart(p)

let prompt=`${g} instrumental lofi beat,

main melody: ${i} with ${rand(hook)},

drum: ${s.drum},
texture: ${rand(texture)},
ambience: ${s.ambience},

tempo: ${s.tempo},

emotion: ${rand(emotion)},
scene: ${rand(story)},

structure:
- melody comes early
- subtle variation every 30 seconds
- emotional peak
- smooth loop

background music for ${p},
immersive, no vocals`

document.getElementById("result").value=prompt
}

</script>

</body>
</html>
