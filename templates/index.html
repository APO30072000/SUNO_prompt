
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lofi Prompt Generator</title>
<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

select,button{
padding:10px;
margin:5px;
width:250px;
}

textarea{
width:100%;
height:150px;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Lofi Prompt Generator</h2>

<form method="POST">

<select name="genre">
{% for x in genre %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<select name="instrument">
{% for x in instrument %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<select name="drum">
{% for x in drum %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<select name="texture">
{% for x in texture %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<select name="ambience">
{% for x in ambience %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<select name="tempo">
{% for x in tempo %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<select name="purpose">
{% for x in purpose %}
<option value="{{x}}">{{x}}</option>
{% endfor %}
</select><br>

<button type="submit">Generate Prompt</button>

</form>

{% if prompt %}
<h3>Prompt:</h3>
<textarea>{{prompt}}</textarea>
{% endif %}

</body>
</html>
